name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  tooling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker compose file
        run: docker compose config

      - name: Validate Bash dev helper syntax
        run: bash -n scripts/dev.sh

      - name: Validate PowerShell dev helper
        shell: pwsh
        run: ./scripts/dev.ps1 help

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint:frontend

      - name: Build frontend
        run: npm run build:frontend

      - name: Test frontend
        run: npm run test:frontend

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f backend/requirements-dev.txt ]; then pip install -r backend/requirements-dev.txt; fi
          pip install black pytest

      - name: Check formatting
        run: black --check backend

      - name: Run backend tests
        run: pytest backend/tests

  extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install extension dependencies
        run: npm install --prefix extension --no-audit --no-fund

      - name: Typecheck extension
        run: npm run --prefix extension typecheck

      - name: Test extension
        run: npm run --prefix extension test

      - name: Build extension
        run: npm run --prefix extension build
